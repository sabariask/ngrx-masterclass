<div class="login-page">
  <div class="login-card">
    <h2>🔐 Login</h2>
    <p class="subtitle">Ngrx Masterclass</p>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" [(ngModel)]="email" placeholder="sana@example.com" class="input" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" [(ngModel)]="password" placeholder="......" class="input" />
    </div>

    @if (errorMessage) {
      <p class="error">❌ {{ errorMessage }}</p>
    }

    <button class="btn-login" (click)="login()">Login</button>

    <button class="btn-quick" (click)="quickLogin()">Quick Login (Dev)</button>
  </div>
</div>
